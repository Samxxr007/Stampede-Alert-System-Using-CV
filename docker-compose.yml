version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crowdrisk-db
    environment:
      POSTGRES_USER: crowduser
      POSTGRES_PASSWORD: crowdpass
      POSTGRES_DB: crowddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowduser -d crowddb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdrisk-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://crowduser:crowdpass@postgres:5432/crowddb
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80"]'
      DEBUG: "true"
    volumes:
      - ./backend:/app
      - backend_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crowdrisk-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── NGINX Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crowdrisk-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
